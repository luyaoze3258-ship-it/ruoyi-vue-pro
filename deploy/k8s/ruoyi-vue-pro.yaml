apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-vue-pro-server
  namespace: lyz-test
  labels:
    app: ruoyi-vue-pro-server
    app.kubernetes.io/name: ruoyi-vue-pro-server
    app.kubernetes.io/part-of: ruoyi-vue-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-vue-pro-server
  template:
    metadata:
      labels:
        app: ruoyi-vue-pro-server
        app.kubernetes.io/name: ruoyi-vue-pro-server
        app.kubernetes.io/part-of: ruoyi-vue-pro
    spec:
      imagePullSecrets:
        - name: tencent-registry
      containers:
        - name: server
          image: ekb-repo.tencentcloudcr.com/library/ruoyi-vue-pro-server:2026.05-ai-assistant-context-20260611015336
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 48080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: JAVA_OPTS
              value: -Xms512m -Xmx1024m -Djava.security.egd=file:/dev/./urandom -Duser.timezone=Asia/Shanghai
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql
                  key: mysql-root-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: redis-password
            - name: GUANLAN_CALLBACK_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: ruoyi-vue-pro-ai-approval
                  key: guanlan-callback-hmac-secret
            - name: ARGS
              value: >-
                --spring.datasource.dynamic.datasource.master.name=ruoyi_vue_pro
                --spring.datasource.dynamic.datasource.master.url=jdbc:mysql://mysql.lyz-test.svc.cluster.local:3306/ruoyi_vue_pro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
                --spring.datasource.dynamic.datasource.master.username=root
                --spring.datasource.dynamic.datasource.master.password=$(MYSQL_ROOT_PASSWORD)
                --spring.datasource.dynamic.datasource.slave.lazy=true
                --spring.datasource.dynamic.datasource.slave.name=ruoyi_vue_pro
                --spring.datasource.dynamic.datasource.slave.url=jdbc:mysql://mysql.lyz-test.svc.cluster.local:3306/ruoyi_vue_pro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
                --spring.datasource.dynamic.datasource.slave.username=root
                --spring.datasource.dynamic.datasource.slave.password=$(MYSQL_ROOT_PASSWORD)
                --spring.redis.host=redis-master.lyz-test.svc.cluster.local
                --spring.redis.port=6379
                --spring.redis.password=$(REDIS_PASSWORD)
                --spring.redis.database=1
                --yudao.web.admin-ui.url=https://guixu.k8s01.ekuaibao.net
                --yudao.captcha.enable=false
                --yudao.bpm.ai-approval.enabled=true
                --yudao.bpm.ai-approval.polling.enabled=true
                --yudao.bpm.ai-approval.polling.batch-size=20
                --yudao.bpm.ai-approval.guanlan.callback.hmac-secret=$(GUANLAN_CALLBACK_HMAC_SECRET)
                --yudao.demo=false
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-vue-pro-server
  namespace: lyz-test
  labels:
    app: ruoyi-vue-pro-server
    app.kubernetes.io/name: ruoyi-vue-pro-server
    app.kubernetes.io/part-of: ruoyi-vue-pro
spec:
  type: ClusterIP
  selector:
    app: ruoyi-vue-pro-server
  ports:
    - name: http
      port: 48080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi
  namespace: lyz-test
  labels:
    app: ruoyi
    app.kubernetes.io/name: ruoyi
    app.kubernetes.io/part-of: ruoyi-vue-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi
  template:
    metadata:
      labels:
        app: ruoyi
        app.kubernetes.io/name: ruoyi
        app.kubernetes.io/part-of: ruoyi-vue-pro
    spec:
      imagePullSecrets:
        - name: tencent-registry
      containers:
        - name: admin
          image: ekb-repo.tencentcloudcr.com/library/ruoyi-vue-pro-admin:2026.05-ai-assistant-ui-20260611022709
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi
  namespace: lyz-test
  labels:
    app: ruoyi
    app.kubernetes.io/name: ruoyi
    app.kubernetes.io/part-of: ruoyi-vue-pro
spec:
  type: NodePort
  selector:
    app: ruoyi
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 13321
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ruoyi
  namespace: lyz-test
  labels:
    app: ruoyi
    app.kubernetes.io/name: ruoyi
    app.kubernetes.io/part-of: ruoyi-vue-pro
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - guixu.k8s01.ekuaibao.net
      secretName: guixu-secret
  rules:
    - host: guixu.k8s01.ekuaibao.net
      http:
        paths:
          - path: /infra/ws
            pathType: Prefix
            backend:
              service:
                name: ruoyi-vue-pro-server
                port:
                  number: 48080
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: ruoyi
                port:
                  number: 80
